<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <linearGradient id="monogramGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="flowWordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" />

  <circle cx="300" cy="300" r="140" fill="none" stroke="url(#borderGrad)" stroke-width="15" filter="url(#glow)"/>

  <path d="M 230,220 C 270,180 330,180 370,220" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
  <path d="M 230,240 C 270,200 330,200 370,240" fill="none" stroke="#334155" stroke-width="2" opacity="0.2" />

  <g transform="translate(190, 240)" filter="url(#glow)">
    
    <path d="M 0,60 C 20,0 60,0 80,60 C 100,0 140,0 160,60" 
          fill="none" 
          stroke="url(#monogramGrad)" 
          stroke-width="18" 
          stroke-linecap="round"/>

    <path d="M 120,40 C 130,-10 170,-10 180,40 M 130,20 L 170,20 M 150,20 C 160,90 130,120 120,130"
          fill="none" 
          stroke="url(#monogramGrad)" 
          stroke-width="12" 
          stroke-linecap="round"/>
          
    <circle cx="150" cy="50" r="3" fill="#38bdf8" opacity="0.8" />
    <circle cx="155" cy="45" r="2" fill="#ec4899" opacity="0.8" />
  </g>

  <g transform="translate(300, 480)" text-anchor="middle">
    <text x="0" y="0" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-weight="800" 
          font-size="48px" 
          letter-spacing="-1px">
      <tspan fill="#38bdf8">w</tspan><tspan fill="url(#flowWordGrad)" filter="url(#glow)" font-style="italic">Flow</tspan>
    </text>
  </g>
</svg>
